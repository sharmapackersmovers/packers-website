<!DOCTYPE html>
<html>
  <head><title>Netlify Forms Detection</title></head>
  <body>
    <!--
      Netlify build bot reads this file to register the "contact" form.
      The actual form UI is in the React app; submissions go via fetch().
    -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact" />
      <input type="text"   name="bot-field" />
      <input type="text"   name="from_name" />
      <input type="tel"    name="phone" />
      <input type="email"  name="email" />
      <input type="text"   name="pickup" />
      <input type="text"   name="destination" />
      <input type="text"   name="service_type" />
      <input type="date"   name="moving_date" />
      <textarea            name="message"></textarea>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
